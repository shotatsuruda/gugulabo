{% extends "base.html" %}
{% block title %}来店記録 - ググラボ{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h4 class="mb-4">来店記録</h4>

    <div id="alert-area"></div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form id="visit-form">

          <div class="mb-3">
            <label class="form-label fw-semibold">顧客名</label>
            <input type="text" id="customer_name" name="customer_name"
                   class="form-control" list="customer-list"
                   placeholder="例）田中花子" required autocomplete="off">
            <datalist id="customer-list"></datalist>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">メニュー</label>
            <select id="menu_name" name="menu_name" class="form-select" required>
              <option value="">選択してください</option>
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">来店日</label>
            <input type="date" id="visited_at" name="visited_at"
                   class="form-control" required>
          </div>

          <button type="submit" class="btn btn-primary w-100" id="save-btn">
            保存する
          </button>
        </form>
      </div>
    </div>

    <div class="mt-3 text-center">
      <a href="/reminder/alerts" class="text-muted small me-3">アラート一覧</a>
      <a href="/reminder/templates" class="text-muted small">テンプレート管理</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const today = new Date().toLocaleDateString("sv-SE");
document.getElementById("visited_at").value = today;

// 顧客名 datalist
fetch("/reminder/customers")
  .then(r => r.json())
  .then(customers => {
    const dl = document.getElementById("customer-list");
    customers.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.name;
      dl.appendChild(opt);
    });
  });

// メニュー select
fetch("/reminder/templates")
  .then(r => r.json())
  .then(templates => {
    const sel = document.getElementById("menu_name");
    const seen = new Set();
    templates.forEach(t => {
      if (!seen.has(t.menu_name)) {
        seen.add(t.menu_name);
        const opt = document.createElement("option");
        opt.value = t.menu_name;
        opt.textContent = t.menu_name;
        sel.appendChild(opt);
      }
    });
  });

// フォーム送信
document.getElementById("visit-form").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  btn.textContent = "保存中...";

  const body = {
    customer_name: document.getElementById("customer_name").value.trim(),
    menu_name:     document.getElementById("menu_name").value,
    visited_at:    document.getElementById("visited_at").value,
  };

  try {
    const res = await fetch("/reminder/visits", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (res.ok) {
      showAlert("success", "来店記録を保存しました。");
      document.getElementById("visit-form").reset();
      document.getElementById("visited_at").value = today;
    } else {
      showAlert("danger", data.error || "エラーが発生しました。");
    }
  } catch {
    showAlert("danger", "通信エラーが発生しました。");
  } finally {
    btn.disabled = false;
    btn.textContent = "保存する";
  }
});

function showAlert(type, msg) {
  const area = document.getElementById("alert-area");
  area.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
    ${msg}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>`;
}
</script>
{% endblock %}

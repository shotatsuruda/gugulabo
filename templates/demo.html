<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>デモ | ググラボ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; margin: 0; padding: 0; background: #F5F3F0; color: #2C2C2C; }
        .page { max-width: 520px; margin: 0 auto; padding: 2rem 1rem; }
        .card { background: #fff; border: 1px solid #E8E4DF; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 8px rgba(0,0,0,0.05); }
        .title { font-size: 1.1rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; }
        .desc { font-size: 0.9rem; color: #9A9A9A; text-align: center; margin-bottom: 1.25rem; }
        .value { font-size: 1rem; font-weight: 600; text-align: center; word-break: break-all; }
    </style>
    </head>
<body>
<div class="page">
    <div class="card">
        <div class="title">place_id</div>
        <div class="desc">URLのクエリから受け取ったIDです</div>
        <div class="value">{{ place_id or '未指定' }}</div>
    </div>
  </div>
</body>
</html>
